<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- QR-like pattern -->
  <g fill="white" opacity="0.95">
    <!-- Top-left corner square -->
    <rect x="96" y="96" width="96" height="96" rx="10"/>
    <rect x="112" y="112" width="64" height="64" rx="6" fill="url(#bg)"/>
    <rect x="128" y="128" width="32" height="32" rx="4"/>
    <!-- Top-right corner square -->
    <rect x="320" y="96" width="96" height="96" rx="10"/>
    <rect x="336" y="112" width="64" height="64" rx="6" fill="url(#bg)"/>
    <rect x="352" y="128" width="32" height="32" rx="4"/>
    <!-- Bottom-left corner square -->
    <rect x="96" y="320" width="96" height="96" rx="10"/>
    <rect x="112" y="336" width="64" height="64" rx="6" fill="url(#bg)"/>
    <rect x="128" y="352" width="32" height="32" rx="4"/>
    <!-- Data dots -->
    <rect x="224" y="96" width="32" height="32" rx="4"/>
    <rect x="224" y="160" width="32" height="32" rx="4"/>
    <rect x="224" y="224" width="64" height="64" rx="8"/>
    <rect x="96" y="224" width="32" height="32" rx="4"/>
    <rect x="160" y="224" width="32" height="32" rx="4"/>
    <rect x="320" y="224" width="32" height="32" rx="4"/>
    <rect x="384" y="224" width="32" height="32" rx="4"/>
    <rect x="224" y="320" width="32" height="32" rx="4"/>
    <rect x="224" y="384" width="32" height="32" rx="4"/>
    <rect x="320" y="320" width="32" height="32" rx="4"/>
    <rect x="384" y="320" width="32" height="32" rx="4"/>
    <rect x="320" y="384" width="32" height="32" rx="4"/>
    <rect x="384" y="384" width="32" height="32" rx="4"/>
  </g>
</svg>
